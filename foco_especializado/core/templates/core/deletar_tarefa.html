{% extends 'core/base.html' %}

{% block title %}Deletar Tarefa - 3 Coisas de Hoje{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Deletar Tarefa</h1>

        <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
            <p class="text-red-800 font-semibold mb-2">Tem certeza que deseja deletar esta tarefa?</p>
            <p class="text-gray-700">
                <strong>Tarefa {{ task.ordem }}:</strong> {{ task.titulo }}
            </p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="flex gap-4">
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-semibold">
                    Sim, Deletar
                </button>
                <a href="{% url 'core:home' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-lg font-semibold">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
